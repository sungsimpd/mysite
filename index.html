<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SUNGSIM</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
  background:#eaf5ef;
}

header{
  background:#fff;
  padding:18px;
  text-align:center;
  font-size:28px;
  font-weight:800;
  border-bottom:2px solid #cfe8d8;
}

/* FILTER */
.topbar{
  display:flex;
  gap:8px;
  padding:10px 20px;
  background:#f6fbf8;
  border-bottom:1px solid #cfe8d8;
}

/* LAYOUT */
.wrap{
  display:flex;
  gap:15px;
  padding:15px;
}

.left{
  flex:2;
}

.right{
  flex:1;
}

.box{
  background:#fff;
  padding:15px;
  margin-bottom:12px;
  border-radius:14px;
  box-shadow:0 3px 10px rgba(0,0,0,0.06);
}

input,select{
  padding:6px;
  margin:3px;
  border:1px solid #cfe8d8;
  border-radius:6px;
  font-size:13px;
}

button{
  padding:5px 8px;
  background:#2f7d4e;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

table{
  width:100%;
  border-collapse:collapse;
}

td,th{
  border-bottom:1px solid #eee;
  padding:6px;
  text-align:center;
}

/* RIGHT ALERT */
.alert{
  background:#f6fbf8;
  border:1px solid #cfe8d8;
  padding:8px;
  margin:5px 0;
  border-radius:8px;
  font-size:12px;
}
</style>
</head>

<body>

<header>SUNGSIM</header>

<!-- FILTER -->
<div class="topbar">

  <select id="yearFilter" onchange="applyFilter()">
    <option value="all">전체연도</option>
  </select>

  <select id="monthFilter" onchange="applyFilter()">
    <option value="all">전체월</option>
    <option value="01">1월</option><option value="02">2월</option>
    <option value="03">3월</option><option value="04">4월</option>
    <option value="05">5월</option><option value="06">6월</option>
    <option value="07">7월</option><option value="08">8월</option>
    <option value="09">9월</option><option value="10">10월</option>
    <option value="11">11월</option><option value="12">12월</option>
  </select>

</div>

<div class="wrap">

<!-- LEFT -->
<div class="left">

  <!-- INPUT -->
  <div class="box">
    <h3>📦 재고 등록</h3>

    <select id="hospital">
      <option>구미차병원</option>
      <option>경주동국대병원</option>
    </select>

    <input id="name" placeholder="시약명">
    <input id="qty" type="number" placeholder="수량">

    <input id="year" placeholder="YYYY" maxlength="4" style="width:70px;">
    <input id="month" placeholder="MM" maxlength="2" style="width:50px;">
    <input id="day" placeholder="DD" maxlength="2" style="width:50px;">

    <input id="lot" placeholder="LOT">

    <button onclick="addItem()">등록</button>
  </div>

  <!-- LIST -->
  <div class="box">
    <h3>📋 재고 목록</h3>

    <table>
      <thead>
        <tr>
          <th>병원</th>
          <th>시약</th>
          <th>수량</th>
          <th>유효기간</th>
          <th>LOT</th>
          <th>관리</th>
        </tr>
      </thead>
      <tbody id="list"></tbody>
    </table>
  </div>

</div>

<!-- RIGHT -->
<div class="right">

  <div class="box">
    <h3>⚠ 미납 / 병원 재고 관리</h3>

    <select id="b_hospital">
      <option>구미차병원</option>
      <option>경주동국대병원</option>
    </select>

    <input id="b_name" placeholder="시약명">
    <input id="b_qty" type="number" placeholder="수량">
    <input id="b_lot" placeholder="LOT">
    <input id="b_exp" placeholder="YYYY-MM-DD">

    <button onclick="addBacklog()">등록</button>

    <div id="backlogList"></div>
  </div>

</div>

</div>

<script>

let items = [];
let backlog = [];

let yearFilter = "all";
let monthFilter = "all";

/* LOAD */
window.onload = () => {
  items = JSON.parse(localStorage.getItem("items") || "[]");
  backlog = JSON.parse(localStorage.getItem("backlog") || "[]");

  initYearFilter();
  render();
  renderBacklog();
};

/* SAVE */
function save(){
  localStorage.setItem("items", JSON.stringify(items));
  localStorage.setItem("backlog", JSON.stringify(backlog));
}

/* FILTER */
function applyFilter(){
  yearFilter = yearFilterEl().value;
  monthFilter = monthFilterEl().value;
  render();
}

function yearFilterEl(){ return document.getElementById("yearFilter"); }
function monthFilterEl(){ return document.getElementById("monthFilter"); }

/* YEAR INIT */
function initYearFilter(){

  let set = new Set();

  items.forEach(i=>{
    let d = i.createdAt || i.exp;
    if(d){
      let y = d.split("-")[0];
      if(y) set.add(y);
    }
  });

  const y = yearFilterEl();
  y.innerHTML = `<option value="all">전체연도</option>`;

  [...set].sort((a,b)=>b-a).forEach(v=>{
    y.innerHTML += `<option value="${v}">${v}</option>`;
  });
}

/* ADD ITEM */
function addItem(){

  const h=hospital.value;
  const n=name.value;
  const q=Number(qty.value);
  const e=`${year.value}-${month.value}-${day.value}`;
  const l=lot.value;

  if(!n||!q){
    alert("필수입력");
    return;
  }

  let createdAt = new Date().toISOString().split("T")[0];

  let t = items.find(i =>
    i.hospital===h &&
    i.name===n &&
    i.exp===e &&
    i.lot===l
  );

  if(t) t.qty += q;
  else items.push({hospital:h,name:n,qty:q,exp:e,lot:l,createdAt});

  save();
  initYearFilter();
  render();
}

/* BACKLOG */
function addBacklog(){

  backlog.push({
    hospital:b_hospital.value,
    name:b_name.value,
    qty:Number(b_qty.value),
    lot:b_lot.value,
    exp:b_exp.value
  });

  save();
  renderBacklog();
}

/* DELETE BACKLOG */
function delBacklog(i){
  backlog.splice(i,1);
  save();
  renderBacklog();
}

/* RENDER BACKLOG */
function renderBacklog(){

  backlogList.innerHTML="";

  backlog.forEach((b,i)=>{
    backlogList.innerHTML += `
      <div class="alert">
        ${b.hospital} | ${b.name} | ${b.qty} | ${b.lot} | ${b.exp}
        <button onclick="delBacklog(${i})">삭제</button>
      </div>
    `;
  });
}

/* UPDATE */
function update(i,key,val){
  if(key==="qty") val=Number(val);
  items[i][key]=val;
  save();
}

/* DELETE */
function del(i){
  items.splice(i,1);
  save();
  render();
}

/* RENDER */
function render(){

  list.innerHTML="";

  items.forEach((i,idx)=>{

    let [y,m,d] = (i.createdAt||"").split("-");

    if(yearFilter!=="all" && y!==yearFilter) return;
    if(monthFilter!=="all" && m!==monthFilter) return;

    list.innerHTML += `
      <tr>

        <td>${i.hospital}</td>

        <td><input value="${i.name}" onchange="update(${idx},'name',this.value)"></td>

        <td><input type="number" value="${i.qty}" onchange="update(${idx},'qty',this.value)"></td>

        <td>${i.exp}</td>

        <td><input value="${i.lot||''}" onchange="update(${idx},'lot',this.value)"></td>

        <td><button onclick="del(${idx})">삭제</button></td>

      </tr>
    `;
  });
}

</script>

</body>
</html>
