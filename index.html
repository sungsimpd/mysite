<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SUNGSIM</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
  background:#eaf5ef;
}

header{
  background:#fff;
  padding:20px;
  text-align:center;
  font-size:30px;
  font-weight:800;
  border-bottom:2px solid #cfe8d8;
}

.container{padding:20px;}

.box{
  background:#fff;
  padding:15px;
  margin-bottom:15px;
  border-radius:14px;
  box-shadow:0 3px 10px rgba(0,0,0,0.06);
}

input,select{
  padding:6px;
  margin:3px;
  border:1px solid #cfe8d8;
  border-radius:6px;
  font-size:13px;
}

button{
  padding:5px 8px;
  background:#2f7d4e;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

button:hover{background:#256642;}

table{
  width:100%;
  border-collapse:collapse;
}

td,th{
  border-bottom:1px solid #eee;
  padding:6px;
  text-align:center;
}

.filterBar button{
  margin-right:5px;
}
</style>
</head>

<body>

<header>SUNGSIM</header>

<div class="container">

<!-- FILTER -->
<div class="box filterBar">
  <button onclick="setFilter('all')">전체</button>
  <button onclick="setFilter('구미차병원')">구미차병원</button>
  <button onclick="setFilter('경주동국대병원')">경주동국대병원</button>
</div>

<!-- INPUT -->
<div class="box">
  <h3>📦 재고 등록</h3>

  <select id="hospital">
    <option>구미차병원</option>
    <option>경주동국대병원</option>
  </select>

  <input id="name" placeholder="시약명">
  <input id="qty" type="number" placeholder="수량">

  <input id="year" placeholder="YYYY" maxlength="4" style="width:70px;">
  <input id="month" placeholder="MM" maxlength="2" style="width:50px;">
  <input id="day" placeholder="DD" maxlength="2" style="width:50px;">

  <input id="lot" placeholder="LOT">

  <button onclick="addItem()">등록</button>
</div>

<!-- OUT -->
<div class="box">
  <h3>🚚 출고</h3>
  <input id="out_name" placeholder="시약명">
  <input id="out_qty" type="number" placeholder="수량">
  <button onclick="outItem()">출고</button>
</div>

<!-- TABLE -->
<div class="box">
  <h3>📋 재고 목록</h3>

  <table>
    <thead>
      <tr>
        <th>병원</th>
        <th>시약</th>
        <th>수량</th>
        <th>유효기간</th>
        <th>LOT</th>
        <th>관리</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>
</div>

</div>

<script>

let items = [];
let filter = "all";
let editMode = null;

/* LOAD */
window.onload = () => {
  items = JSON.parse(localStorage.getItem("items") || "[]");
  render();
};

/* SAVE */
function save(){
  localStorage.setItem("items", JSON.stringify(items));
}

/* FILTER */
function setFilter(v){
  filter = v;
  render();
}

/* DATE */
function makeDate(){
  const y=year.value;
  const m=month.value;
  const d=day.value;
  if(!y||!m||!d) return "";
  return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
}

/* ADD */
function addItem(){

  const h=hospital.value;
  const n=name.value;
  const q=Number(qty.value);
  const e=makeDate();
  const l=lot.value;

  if(!n||!q){
    alert("필수입력");
    return;
  }

  let t = items.find(i =>
    i.hospital===h &&
    i.name===n &&
    i.exp===e &&
    i.lot===l
  );

  if(t) t.qty += q;
  else items.push({hospital:h,name:n,qty:q,exp:e,lot:l});

  save();
  render();
}

/* OUT */
function outItem(){

  const n=out_name.value;
  const q=Number(out_qty.value);

  let t=items.find(i=>i.name===n);

  if(!t) return alert("재고없음");
  if(t.qty<q) return alert("부족");

  t.qty -= q;
  save();
  render();
}

/* UPDATE */
function update(i,key,val){

  if(key==="qty") val=Number(val);

  items[i][key]=val;
  save();
}

/* DELETE */
function del(i){
  items.splice(i,1);
  save();
  render();
}

/* RENDER */
function render(){

  list.innerHTML="";

  items.forEach((i,idx)=>{

    if(filter!=="all" && i.hospital!==filter) return;

    let [y,m,d] = (i.exp||"---").split("-");

    list.innerHTML += `
      <tr>

        <td>
          <select onchange="update(${idx},'hospital',this.value)">
            <option ${i.hospital==="구미차병원"?"selected":""}>구미차병원</option>
            <option ${i.hospital==="경주동국대병원"?"selected":""}>경주동국대병원</option>
          </select>
        </td>

        <td>
          <input value="${i.name}" onchange="update(${idx},'name',this.value)">
        </td>

        <td>
          <input type="number" value="${i.qty}" onchange="update(${idx},'qty',this.value)">
        </td>

        <td>
          <input style="width:60px" value="${y||''}" onchange="updateExp(${idx},'y',this.value)">
          <input style="width:40px" value="${m||''}" onchange="updateExp(${idx},'m',this.value)">
          <input style="width:40px" value="${d||''}" onchange="updateExp(${idx},'d',this.value)">
        </td>

        <td>
          <input value="${i.lot||''}" onchange="update(${idx},'lot',this.value)">
        </td>

        <td>
          <button onclick="del(${idx})">삭제</button>
        </td>

      </tr>
    `;
  });
}

/* EXP UPDATE */
function updateExp(i,type,val){

  let [y,m,d] = (items[i].exp||"---").split("-");

  if(type==="y") y=val;
  if(type==="m") m=val;
  if(type==="d") d=val;

  items[i].exp = `${y||'0000'}-${m||'01'}-${d||'01'}`;

  save();
}

</script>

</body>
</html>
