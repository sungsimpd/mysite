<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SUNGSIM</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
  background:#eef6f0;
}

/* HEADER */
header{
  position:relative;
  background:#fff;
  padding:18px;
  text-align:center;
  font-size:26px;
  font-weight:800;
  border-bottom:2px solid #d6eadc;
}

/* CLOCK */
#clockBox{
  position:absolute;
  right:16px;
  top:50%;
  transform:translateY(-50%);
  background:#f4fbf7;
  border:1px solid #cfe8d8;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
  color:#2f7d4e;
  letter-spacing:0.3px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

/* FILTER */
.topbar{
  display:flex;
  gap:10px;
  padding:12px 20px;
  background:#f6fbf8;
  border-bottom:1px solid #d6eadc;
}

select{
  padding:6px 10px;
  border:1px solid #cfe8d8;
  border-radius:8px;
  font-size:13px;
}

/* LAYOUT */
.wrap{
  display:flex;
  gap:15px;
  padding:15px;
}

.left{ flex:2; }
.right{ flex:1; }

.box{
  background:#fff;
  padding:15px;
  margin-bottom:12px;
  border-radius:14px;
  box-shadow:0 3px 10px rgba(0,0,0,0.06);
}

input,select{
  padding:7px;
  margin:3px;
  border:1px solid #cfe8d8;
  border-radius:8px;
  font-size:13px;
}

button{
  padding:6px 10px;
  background:#2f7d4e;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
}

table{
  width:100%;
  border-collapse:collapse;
}

td,th{
  border-bottom:1px solid #eee;
  padding:6px;
  text-align:center;
}

td input{
  width:90%;
}

.alert{
  background:#f6fbf8;
  border:1px solid #cfe8d8;
  padding:8px;
  margin:5px 0;
  border-radius:10px;
  font-size:12px;
}
</style>
</head>

<body>

<header>
  SUNGSIM
  <div id="clockBox"></div>
</header>

<!-- FILTER -->
<div class="topbar">

  <select id="yearFilter" onchange="applyFilter()">
    <option value="all">전체연도</option>
  </select>

  <select id="monthFilter" onchange="applyFilter()">
    <option value="all">전체월</option>
    <option value="01">1월</option><option value="02">2월</option>
    <option value="03">3월</option><option value="04">4월</option>
    <option value="05">5월</option><option value="06">6월</option>
    <option value="07">7월</option><option value="08">8월</option>
    <option value="09">9월</option><option value="10">10월</option>
    <option value="11">11월</option><option value="12">12월</option>
  </select>

</div>

<div class="wrap">

<!-- LEFT -->
<div class="left">

  <div class="box">
    <h3>📦 재고 등록</h3>

    <select id="hospital">
      <option>구미차병원</option>
      <option>경주동국대병원</option>
    </select>

    <input id="reagentName" placeholder="시약명">
    <input id="qty" type="number" placeholder="수량">

    <input id="year" placeholder="YYYY" maxlength="4" style="width:70px;">
    <input id="month" placeholder="MM" maxlength="2" style="width:50px;">
    <input id="day" placeholder="DD" maxlength="2" style="width:50px;">

    <input id="lot" placeholder="LOT">

    <button onclick="addItem()">등록</button>
  </div>

  <div class="box">
    <h3>📋 재고 목록</h3>

    <table>
      <thead>
        <tr>
          <th>병원</th>
          <th>시약</th>
          <th>수량</th>
          <th>유효기간</th>
          <th>LOT</th>
          <th>관리</th>
        </tr>
      </thead>
      <tbody id="list"></tbody>
    </table>

  </div>
</div>

<!-- RIGHT -->
<div class="right">

  <div class="box">
    <h3>⚠ 미납 / 재고관리</h3>

    <select id="b_hospital">
      <option>구미차병원</option>
      <option>경주동국대병원</option>
    </select>

    <input id="b_name" placeholder="시약명">
    <input id="b_qty" type="number" placeholder="수량">
    <input id="b_lot" placeholder="LOT">
    <input id="b_exp" placeholder="YYYY-MM-DD">

    <button onclick="addBacklog()">등록</button>

    <div id="backlogList"></div>
  </div>

</div>

</div>

<script>

let items = [];
let backlog = [];

let yearFilter = "all";
let monthFilter = "all";

/* CLOCK */
function updateClock(){

  const now = new Date();

  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,"0");
  const d = String(now.getDate()).padStart(2,"0");

  const h = String(now.getHours()).padStart(2,"0");
  const mi = String(now.getMinutes()).padStart(2,"0");
  const s = String(now.getSeconds()).padStart(2,"0");

  document.getElementById("clockBox").innerHTML =
    `${y}-${m}-${d} ${h}:${mi}:${s}`;
}

setInterval(updateClock,1000);
updateClock();

/* INIT */
window.onload = () => {

  items = JSON.parse(localStorage.getItem("items") || "[]");
  backlog = JSON.parse(localStorage.getItem("backlog") || "[]");

  checkMonthRollover();

  initYearFilter();
  render();
  renderBacklog();
};

/* SAVE */
function save(){
  localStorage.setItem("items", JSON.stringify(items));
  localStorage.setItem("backlog", JSON.stringify(backlog));
}

/* MONTH ROLLOVER */
function checkMonthRollover(){

  const now = new Date();
  const current = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;

  const saved = localStorage.getItem("currentPeriod");

  if(saved === current) return;

  const copy = items.map(i=>({
    ...i,
    id: Date.now() + Math.random(),
    period: current
  }));

  items = items.concat(copy);

  localStorage.setItem("currentPeriod", current);
  save();
}

/* FILTER */
function applyFilter(){
  yearFilter = document.getElementById("yearFilter").value;
  monthFilter = document.getElementById("monthFilter").value;
  render();
}

/* YEAR FILTER */
function initYearFilter(){

  const y = document.getElementById("yearFilter");
  let set = new Set();

  const nowYear = new Date().getFullYear();

  items.forEach(i=>{
    let y1 = (i.createdAt||"").split("-")[0];
    let y2 = (i.exp||"").split("-")[0];
    if(y1) set.add(y1);
    if(y2) set.add(y2);
  });

  for(let i=nowYear-2;i<=nowYear+3;i++){
    set.add(String(i));
  }

  y.innerHTML = `<option value="all">전체연도</option>`;

  [...set].sort((a,b)=>b-a).forEach(v=>{
    y.innerHTML += `<option value="${v}">${v}</option>`;
  });
}

/* ADD */
function addItem(){

  const h = document.getElementById("hospital").value;
  const n = document.getElementById("reagentName").value.trim();
  const q = Number(document.getElementById("qty").value);
  const e = `${document.getElementById("year").value}-${document.getElementById("month").value}-${document.getElementById("day").value}`;
  const l = document.getElementById("lot").value;

  if(!n || isNaN(q) || q<=0){
    alert("필수입력");
    return;
  }

  let id = Date.now();
  let createdAt = new Date().toISOString().split("T")[0];

  items.push({
    id,
    hospital:h,
    name:n,
    qty:q,
    exp:e,
    lot:l,
    createdAt,
    period: createdAt.slice(0,7)
  });

  save();
  initYearFilter();
  render();
}

/* UPDATE */
function update(id,key,val){

  let t = items.find(i=>i.id===id);
  if(!t) return;

  if(key==="qty") val = Number(val);

  t[key]=val;
  save();
}

/* DELETE */
function del(id){
  items = items.filter(i=>i.id!==id);
  save();
  render();
}

/* RENDER */
function render(){

  const tbody = document.getElementById("list");
  tbody.innerHTML = "";

  items.forEach(i=>{

    let y = (i.createdAt||"").split("-")[0];
    let m = (i.createdAt||"").split("-")[1];

    if(yearFilter!=="all" && y!==yearFilter) return;
    if(monthFilter!=="all" && m!==monthFilter) return;

    tbody.innerHTML += `
      <tr>
        <td>${i.hospital}</td>

        <td><input value="${i.name}" onchange="update(${i.id},'name',this.value)"></td>

        <td><input type="number" value="${i.qty}" onchange="update(${i.id},'qty',this.value)"></td>

        <td>${i.exp}</td>

        <td><input value="${i.lot||''}" onchange="update(${i.id},'lot',this.value)"></td>

        <td><button onclick="del(${i.id})">삭제</button></td>
      </tr>
    `;
  });
}

/* BACKLOG */
function addBacklog(){

  backlog.push({
    hospital:document.getElementById("b_hospital").value,
    name:document.getElementById("b_name").value,
    qty:Number(document.getElementById("b_qty").value),
    lot:document.getElementById("b_lot").value,
    exp:document.getElementById("b_exp").value
  });

  save();
  renderBacklog();
}

function delBacklog(i){
  backlog.splice(i,1);
  save();
  renderBacklog();
}

function renderBacklog(){

  const box = document.getElementById("backlogList");
  box.innerHTML = "";

  backlog.forEach((b,i)=>{
    box.innerHTML += `
      <div class="alert">
        ${b.hospital} | ${b.name} | ${b.qty} | ${b.lot} | ${b.exp}
        <button onclick="delBacklog(${i})">삭제</button>
      </div>
    `;
  });
}

</script>

</body>
</html>
