<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SUNGSIM</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
  background:#eaf5ef;
}

header{
  background:#fff;
  padding:22px;
  text-align:center;
  font-size:32px;
  font-weight:800;
  border-bottom:2px solid #cfe8d8;
}

.container{display:flex;gap:20px;padding:20px;}
.left{width:65%;}
.right{width:35%;}

.box{
  background:#fff;
  padding:15px;
  margin:15px 0;
  border-radius:14px;
  box-shadow:0 3px 10px rgba(0,0,0,0.06);
  border:1px solid #d9eee1;
}

input,select,textarea{
  padding:8px;
  margin:5px;
  border:1px solid #cfe8d8;
  border-radius:8px;
}

button{
  padding:8px 12px;
  border:none;
  background:#2f7d4e;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
}

button:hover{background:#256642;}

table{
  width:100%;
  border-collapse:collapse;
}

td,th{
  border-bottom:1px solid #eee;
  padding:6px;
}

.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card{
  background:#f6fbf8;
  border:1px solid #d9eee1;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

#logoutBtn{
  position:fixed;
  bottom:20px;
  right:20px;
}
</style>
</head>

<body>

<header>SUNGSIM</header>
<button id="logoutBtn" onclick="logout()">로그아웃</button>

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h3>로그인</h3>
  <input id="id" placeholder="email">
  <input id="pw" type="password" placeholder="password">
  <button onclick="login()">로그인</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
<div class="container">

<!-- LEFT -->
<div class="left">

<div class="box">
  <h3>📦 재고 등록</h3>
  <input id="name" placeholder="시약명">
  <input id="qty" type="number" placeholder="수량">
  <input id="exp" type="date">
  <input id="lot" placeholder="LOT">
  <button onclick="addItem()">등록</button>
</div>

<div class="box">
  <h3>🚚 출고</h3>
  <input id="out_name" placeholder="시약명">
  <input id="out_qty" type="number" placeholder="수량">
  <button onclick="addOut()">출고</button>
</div>

<div class="box">
  <h3>📊 병원 대시보드</h3>
  <div id="dashboard" class="dashboard"></div>
</div>

<div class="box">
  <h3>📋 재고 목록</h3>
  <table>
    <thead>
      <tr>
        <th>병원</th>
        <th>시약</th>
        <th>수량</th>
        <th>유효기간</th>
        <th>LOT</th>
        <th>삭제</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>
</div>

</div>
</div>
</div>

<script>

/* ===== FIREBASE CONFIG (여기만 수정) ===== */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();
const col = db.collection("items");

/* ===== STATE ===== */
let items = [];
let currentHospital = "구미차병원";

/* ===== AUTH ===== */
auth.onAuthStateChanged(user => {

  if(!user){
    loginBox.style.display="block";
    app.style.display="none";
    return;
  }

  loginBox.style.display="none";
  app.style.display="block";

  listenData();
});

function login(){
  auth.signInWithEmailAndPassword(id.value, pw.value)
    .catch(e=>alert(e.message));
}

function logout(){
  auth.signOut();
}

/* ===== REALTIME ===== */
function listenData(){

  col.onSnapshot(snap=>{

    items = [];

    snap.forEach(doc=>{
      items.push({id:doc.id, ...doc.data()});
    });

    render();
  });
}

/* ===== MERGE ===== */
function mergeItem(n){

  let found = items.find(i =>
    i.hospital === currentHospital &&
    i.name === n.name &&
    i.lot === n.lot &&
    i.exp === n.exp
  );

  if(found){
    col.doc(found.id).update({
      qty: found.qty + Number(n.qty)
    });
  }else{
    col.add({...n, hospital:currentHospital});
  }
}

/* ===== ADD ===== */
function addItem(){

  mergeItem({
    name:name.value,
    qty:Number(qty.value),
    exp:exp.value,
    lot:lot.value
  });
}

/* ===== EDIT ===== */
function editItem(id,key,value){
  col.doc(id).update({
    [key]: key==="qty" ? Number(value) : value
  });
}

/* ===== DELETE ===== */
function deleteItem(id){
  col.doc(id).delete();
}

/* ===== OUT ===== */
function addOut(){

  let t = items.find(i => i.name === out_name.value);

  if(!t) return alert("재고 없음");

  let q = Number(out_qty.value);

  if(t.qty < q) return alert("부족");

  col.doc(t.id).update({
    qty: t.qty - q
  });
}

/* ===== RENDER ===== */
function render(){

  list.innerHTML="";

  items.forEach(i=>{

    list.innerHTML += `
      <tr>
        <td>${i.hospital}</td>

        <td><input value="${i.name}"
          onchange="editItem('${i.id}','name',this.value)"></td>

        <td><input value="${i.qty}"
          onchange="editItem('${i.id}','qty',this.value)"></td>

        <td><input type="date" value="${i.exp || ''}"
          onchange="editItem('${i.id}','exp',this.value)"></td>

        <td><input value="${i.lot || ''}"
          onchange="editItem('${i.id}','lot',this.value)"></td>

        <td><button onclick="deleteItem('${i.id}')">삭제</button></td>
      </tr>
    `;
  });

  dash();
}

/* ===== DASHBOARD ===== */
function dash(){

  let m={};

  items.forEach(i=>{
    m[i.hospital]=(m[i.hospital]||0)+i.qty;
  });

  dashboard.innerHTML="";

  for(let k in m){
    dashboard.innerHTML += `
      <div class="card">
        <h3>${k}</h3>
        <div>${m[k]} EA</div>
      </div>
    `;
  }
}

</script>

</body>
</html>
