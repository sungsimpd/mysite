<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SUNGSIM</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
  background:#eaf5ef;
}

header{
  background:#fff;
  padding:22px;
  text-align:center;
  font-size:32px;
  font-weight:800;
  border-bottom:2px solid #cfe8d8;
}

.container{display:flex;gap:20px;padding:20px;}
.left{width:65%;}
.right{width:35%;}

.box{
  background:#fff;
  padding:15px;
  margin:15px 0;
  border-radius:14px;
  box-shadow:0 3px 10px rgba(0,0,0,0.06);
  border:1px solid #d9eee1;
}

input,select,textarea{
  padding:8px;
  margin:5px;
  border:1px solid #cfe8d8;
  border-radius:8px;
}

button{
  padding:8px 12px;
  border:none;
  background:#2f7d4e;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
}

button:hover{background:#256642;}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border-bottom:1px solid #eee;
  padding:6px;
  text-align:left;
}

.card{
  background:#f6fbf8;
  border:1px solid #d9eee1;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.alert{
  background:#fff5f5;
  border-left:4px solid red;
  padding:8px;
  margin:5px 0;
}

#logoutBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#2f7d4e;
}
</style>
</head>

<body>

<header>SUNGSIM</header>
<button id="logoutBtn" onclick="logout()">로그아웃</button>

<div class="container">

<!-- LEFT -->
<div class="left">

<div class="box">
  <h3>🏥 병원</h3>
  <select id="hospital"></select>
</div>

<div class="box">
  <h3>📦 재고 등록</h3>
  <input id="name" placeholder="시약명">
  <input id="qty" type="number" placeholder="수량">
  <input id="exp" type="date">
  <input id="lot" placeholder="LOT">
  <button onclick="addItem()">등록</button>
</div>

<div class="box">
  <h3>📥 대량등록</h3>
  <textarea id="bulkInput" rows="5" style="width:100%"></textarea>
  <button onclick="bulkAdd()">등록</button>
</div>

<div class="box">
  <h3>🚚 출고</h3>
  <input id="out_name" placeholder="시약명">
  <input id="out_qty" type="number" placeholder="수량">
  <button onclick="addOut()">출고</button>
</div>

<div class="box">
  <h3>📊 병원 대시보드</h3>
  <div id="dashboard" class="dashboard"></div>
</div>

<div class="box">
  <h3>📋 재고</h3>
  <table>
    <thead>
      <tr>
        <th>병원</th>
        <th>시약</th>
        <th>수량</th>
        <th>유효기간</th>
        <th>LOT</th>
        <th>삭제</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>
</div>

</div>

</div>

<script>

/* ===== DATA ===== */
let items=[];

/* ===== LOAD ===== */
window.onload=()=>{
  loadData();

  hospital.innerHTML=`
    <option>구미차병원</option>
    <option>경주동국대병원</option>
  `;

  render();
};

/* ===== SAVE ===== */
function saveData(){
  localStorage.setItem("sungsim",JSON.stringify(items));
}

function loadData(){
  items = JSON.parse(localStorage.getItem("sungsim")||"[]");
}

/* ===== MERGE ===== */
function mergeItem(n){

  let f = items.find(i =>
    i.hospital===n.hospital &&
    i.name===n.name &&
    i.lot===n.lot &&
    i.exp===n.exp
  );

  if(f) f.qty += Number(n.qty);
  else items.push(n);
}

/* ===== ADD ===== */
function addItem(){

  if(!name.value || !qty.value){
    alert("필수");
    return;
  }

  mergeItem({
    hospital:hospital.value,
    name:name.value,
    qty:Number(qty.value),
    exp:exp.value||"",
    lot:lot.value||""
  });

  saveData();
  render();
}

/* ===== BULK ===== */
function bulkAdd(){

  bulkInput.value.split("\n").forEach(l=>{

    let p=l.split("|");
    if(!p[0]) return;

    mergeItem({
      hospital:hospital.value,
      name:p[0].trim(),
      qty:Number(p[1]||0),
      exp:(p[2]||"").trim(),
      lot:(p[3]||"").trim()
    });
  });

  saveData();
  render();
}

/* ===== OUT ===== */
function addOut(){

  let t = items.find(i=>i.name===out_name.value);

  if(!t){alert("없음");return;}
  if(t.qty < out_qty.value){alert("부족");return;}

  t.qty -= Number(out_qty.value);

  saveData();
  render();
}

/* ===== EDIT ===== */
function edit(i,k,v){
  items[i][k] = (k==="qty") ? Number(v) : v;
  saveData();
}

/* ===== DELETE ===== */
function del(i){
  items.splice(i,1);
  saveData();
  render();
}

/* ===== DASH ===== */
function dash(){

  let m={};

  items.forEach(i=>{
    m[i.hospital]=(m[i.hospital]||0)+i.qty;
  });

  dashboard.innerHTML="";

  for(let k in m){
    dashboard.innerHTML+=`
      <div class="card">
        <h3>${k}</h3>
        <div>${m[k]} EA</div>
      </div>
    `;
  }
}

/* ===== RENDER ===== */
function render(){

  list.innerHTML="";

  items.forEach((i,idx)=>{

    list.innerHTML+=`
      <tr>
        <td>${i.hospital}</td>

        <td><input value="${i.name}" onchange="edit(${idx},'name',this.value)"></td>

        <td><input value="${i.qty}" onchange="edit(${idx},'qty',this.value)"></td>

        <td><input type="date" value="${i.exp}" onchange="edit(${idx},'exp',this.value)"></td>

        <td><input value="${i.lot}" onchange="edit(${idx},'lot',this.value)"></td>

        <td><button onclick="del(${idx})">X</button></td>
      </tr>
    `;
  });

  dash();
}

/* ===== LOGOUT ===== */
function logout(){
  location.reload();
}

</script>

</body>
</html>
