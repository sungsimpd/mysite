<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SUNGSIM</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
  background:#eaf5ef;
}

header{
  background:#fff;
  padding:20px;
  text-align:center;
  font-size:30px;
  font-weight:800;
  border-bottom:2px solid #cfe8d8;
}

.container{display:flex;gap:20px;padding:20px;}
.left{width:65%;}
.right{width:35%;}

.box{
  background:#fff;
  padding:15px;
  margin-bottom:15px;
  border-radius:14px;
  box-shadow:0 3px 10px rgba(0,0,0,0.06);
}

input,select{
  padding:7px;
  margin:4px;
  border:1px solid #cfe8d8;
  border-radius:8px;
}

button{
  padding:6px 10px;
  background:#2f7d4e;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button:hover{background:#256642;}

table{
  width:100%;
  border-collapse:collapse;
}

td,th{
  border-bottom:1px solid #eee;
  padding:6px;
}

/* RIGHT 유지 */
.rightBox{
  max-height:300px;
  overflow-y:auto;
}

.alert{
  background:#fff;
  border-left:4px solid #2f7d4e;
  padding:8px;
  margin:5px 0;
  border-radius:8px;
}
</style>
</head>

<body>

<header>SUNGSIM</header>

<div class="container">

<!-- LEFT -->
<div class="left">

<!-- 재고 -->
<div class="box">
  <h3>📦 재고 등록</h3>

  <select id="hospital">
    <option>구미차병원</option>
    <option>경주동국대병원</option>
  </select>

  <input id="name" placeholder="시약명">
  <input id="qty" type="number" placeholder="수량">
  <input id="exp" type="date">
  <input id="lot" placeholder="LOT">
  <button onclick="addItem()">등록</button>
</div>

<!-- 출고 -->
<div class="box">
  <h3>🚚 출고</h3>
  <input id="out_name" placeholder="시약명">
  <input id="out_qty" type="number" placeholder="수량">
  <button onclick="outItem()">출고</button>
</div>

<!-- 재고 목록 -->
<div class="box">
  <h3>📋 재고 목록</h3>

  <table>
    <thead>
      <tr>
        <th>병원</th>
        <th>시약</th>
        <th>수량</th>
        <th>유효기간</th>
        <th>LOT</th>
        <th>삭제</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>
</div>

</div>

<!-- RIGHT (미납 유지) -->
<div class="right">

<div class="box">
  <h3>⚠ 미납 시약 관리</h3>
  <div class="rightBox" id="backlog"></div>
</div>

</div>

</div>

<script>

/* ================= STATE ================= */
let items = [];
let backlog = [];

/* ================= INIT ================= */
window.onload = () => {
  items = JSON.parse(localStorage.getItem("items") || "[]");
  backlog = JSON.parse(localStorage.getItem("backlog") || "[]");
  render();
  renderBacklog();
};

/* ================= SAVE ================= */
function save(){
  localStorage.setItem("items", JSON.stringify(items));
  localStorage.setItem("backlog", JSON.stringify(backlog));
}

/* ================= ADD (중복 합산 유지) ================= */
function addItem(){

  const h = hospital.value;
  const n = name.value;
  const q = Number(qty.value);
  const e = exp.value;
  const l = lot.value;

  if(!n || !q){
    alert("필수 입력");
    return;
  }

  let t = items.find(i =>
    i.hospital === h &&
    i.name === n &&
    i.exp === e &&
    i.lot === l
  );

  if(t){
    t.qty += q;
  }else{
    items.push({
      hospital:h,
      name:n,
      qty:q,
      exp:e,
      lot:l
    });
  }

  save();
  render();
}

/* ================= OUT ================= */
function outItem(){

  const n = out_name.value;
  const q = Number(out_qty.value);

  let t = items.find(i => i.name === n);

  if(!t){
    alert("재고 없음");
    return;
  }

  if(t.qty < q){
    alert("수량 부족");
    return;
  }

  t.qty -= q;

  save();
  render();
}

/* ================= DELETE ================= */
function deleteItem(i){
  items.splice(i,1);
  save();
  render();
}

/* ================= RENDER ================= */
function render(){

  list.innerHTML = "";

  items.forEach((i,idx)=>{

    list.innerHTML += `
      <tr>
        <td>${i.hospital}</td>
        <td>${i.name}</td>
        <td>${i.qty}</td>
        <td>${i.exp||""}</td>
        <td>${i.lot||""}</td>
        <td><button onclick="deleteItem(${idx})">삭제</button></td>
      </tr>
    `;
  });
}

/* ================= BACKLOG (오른쪽 유지) ================= */
function renderBacklog(){

  backlog.innerHTML = "";

  backlog.forEach(b=>{
    backlog.innerHTML += `
      <div class="alert">
        ${b.name || "미납"} / ${b.text || "대기"}
      </div>
    `;
  });
}

/* ================= 자동 미납 테스트 ================= */
function addBacklog(){

  backlog.push({
    name:"미납",
    text:"자동 등록"
  });

  save();
  renderBacklog();
}

</script>

</body>
</html>
