<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SUNGSIM</title>

<style>

body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
  background:#f7f8fa;
}

/* HEADER */
header{
  background:#fff;
  padding:22px;
  text-align:center;
  font-size:32px;
  font-weight:800;
  border-bottom:1px solid #eaeaea;
}

/* LAYOUT */
.container{display:flex;gap:20px;padding:20px;}
.left{width:65%;}
.right{width:35%;}

.box{
  background:#fff;
  padding:15px;
  margin:15px 0;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

/* INPUT */
input,select,textarea{
  padding:8px;
  margin:5px;
  border:1px solid #ddd;
  border-radius:6px;
}

/* BUTTON */
button{
  padding:8px 12px;
  border:none;
  background:#111;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
  margin:3px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th,td{
  border-bottom:1px solid #eee;
  padding:8px;
  text-align:left;
}

/* ALERT */
.alert{
  background:#fff5f5;
  border-left:4px solid red;
  padding:8px;
  margin:5px 0;
}

/* LOGOUT */
#logoutBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#111;
  padding:10px 14px;
  border-radius:10px;
}

</style>
</head>

<body>

<header>SUNGSIM</header>

<button id="logoutBtn" onclick="logout()">로그아웃</button>

<div class="container">

<!-- LEFT -->
<div class="left">

<div class="box">
  <h3>🏥 병원 필터</h3>
  <select id="viewHospital" onchange="render()">
    <option value="all">전체</option>
  </select>
</div>

<div class="box">
  <h3>📦 재고 등록</h3>
  <select id="hospital"></select>
  <input id="name" placeholder="시약명">
  <input id="qty" placeholder="수량">
  <input id="exp" type="date">
  <input id="lot" placeholder="LOT">
  <button onclick="addItem()">등록</button>
</div>

<div class="box">
  <h3>📥 대량 등록 (엑셀형)</h3>

  <table>
    <tr>
      <th>시약명 | 수량 | 유효기간 | LOT</th>
    </tr>
  </table>

  <textarea id="bulkInput" rows="6" style="width:100%"></textarea>

  <button onclick="bulkAdd()">일괄등록</button>
</div>

<div class="box">
  <h3>📋 재고 목록</h3>
  <table>
    <thead>
      <tr>
        <th>병원</th>
        <th>시약</th>
        <th>수량</th>
        <th>유효기간</th>
        <th>LOT</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>
</div>

</div>

<!-- RIGHT -->
<div class="right">

<div class="box">
  <h3>🏢 거래처 필터</h3>
  <div id="clientButtons"></div>
</div>

<div class="box">
  <h3>📌 미납</h3>

  <select id="b_hospital"></select>
  <input id="b_name" placeholder="시약명">
  <input id="b_qty" placeholder="수량">
  <input id="b_reason" placeholder="사유">
  <button onclick="addBacklog()">등록</button>

  <hr>

  <select id="filterHospital" onchange="renderBacklog()"></select>
  <select id="filterMonth" onchange="renderBacklog()">
    <option value="all">전체월</option>
    <option value="1">1</option><option value="2">2</option>
    <option value="3">3</option><option value="4">4</option>
    <option value="5">5</option><option value="6">6</option>
    <option value="7">7</option><option value="8">8</option>
    <option value="9">9</option><option value="10">10</option>
    <option value="11">11</option><option value="12">12</option>
  </select>

  <div id="backlogList"></div>
</div>

</div>
</div>

<script>

/* ================= DATA ================= */
let items=[];
let backlog=[];
let selectedClient=null;

/* ================= INIT ================= */
window.onload=()=>{

  const h=["경주동국대병원","구미차병원"];

  h.forEach(v=>{
    hospital.innerHTML+=`<option>${v}</option>`;
    b_hospital.innerHTML+=`<option>${v}</option>`;
    filterHospital.innerHTML+=`<option>${v}</option>`;
    viewHospital.innerHTML+=`<option value="${v}">${v}</option>`;
  });

  renderClientButtons();
};

/* ================= ADD ================= */
function addItem(){

  if(!name.value||!qty.value||!exp.value){
    alert("필수 입력");
    return;
  }

  items.push({
    hospital:hospital.value,
    name:name.value,
    qty:+qty.value,
    exp:exp.value,
    lot:lot.value
  });

  render();
}

/* ================= BULK (FIXED) ================= */
function bulkAdd(){

  bulkInput.value.split("\n").forEach(line=>{

    if(!line.trim()) return;

    let p=line.split("|");

    items.push({
      hospital:hospital.value,
      name:(p[0]||"").trim(),
      qty:Number((p[1]||0).trim()),
      exp:(p[2]||"").trim(),
      lot:(p[3]||"").trim()
    });

  });

  render();
}

/* ================= RENDER ================= */
function render(){

  list.innerHTML="";

  let selected=viewHospital.value;

  let filtered=items.filter(i=>{
    let hOk = selected==="all"||i.hospital===selected;
    let cOk = !selectedClient || i.hospital===selectedClient;
    return hOk && cOk;
  });

  filtered.forEach(i=>{

    let diff=(new Date(i.exp)-new Date())/86400000;
    let status=diff<0?"❌":diff<7?"🔥":"✅";

    list.innerHTML+=`
      <tr>
        <td>${i.hospital}</td>
        <td>${i.name}</td>
        <td>${i.qty}</td>
        <td>${i.exp}</td>
        <td>${i.lot||"-"}</td>
      </tr>
    `;
  });

  renderBacklog();
}

/* ================= CLIENT BUTTON (FIXED) ================= */
function renderClientButtons(){

  clientButtons.innerHTML="";

  [...new Set(items.map(i=>i.hospital))].forEach(c=>{
    clientButtons.innerHTML+=
    `<button onclick="toggleClient('${c}')">${c}</button>`;
  });
}

function toggleClient(c){

  selectedClient = (selectedClient===c)?null:c;
  render();
}

/* ================= BACKLOG ================= */
function addBacklog(){

  backlog.push({
    hospital:b_hospital.value,
    name:b_name.value,
    qty:+b_qty.value,
    reason:b_reason.value,
    date:new Date()
  });

  renderBacklog();
}

function renderBacklog(){

  backlogList.innerHTML="";

  let fh=filterHospital.value;
  let fm=filterMonth.value;

  let group={};

  backlog.forEach(i=>{

    if(fh!="all"&&i.hospital!=fh) return;

    let m=new Date(i.date).getMonth()+1;
    if(fm!="all"&&fm!=m) return;

    let key=i.hospital+"_"+m;

    if(!group[key]) group[key]=[];
    group[key].push(i);
  });

  for(let k in group){

    backlogList.innerHTML+=`<h4>${k}</h4>`;

    group[k].forEach(i=>{
      backlogList.innerHTML+=
      `<div class="alert">${i.name} | ${i.qty} | ${i.reason}</div>`;
    });
  }
}

/* ================= LOGOUT ================= */
function logout(){
  location.reload();
}

</script>

</body>
</html>
