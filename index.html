<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SUNGSIM</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
  background:#f7f8fa;
}

header{
  background:#fff;
  padding:22px;
  text-align:center;
  font-size:32px;
  font-weight:800;
  border-bottom:1px solid #eaeaea;
}

.container{display:flex;gap:20px;padding:20px;}
.left{width:65%;}
.right{width:35%;}

.box{
  background:#fff;
  padding:15px;
  margin:15px 0;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

input,select,textarea{
  padding:8px;
  margin:5px;
  border:1px solid #ddd;
  border-radius:6px;
}

button{
  padding:8px 12px;
  border:none;
  background:#111;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
  margin:3px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border-bottom:1px solid #eee;
  padding:6px;
  text-align:left;
}

.alert{
  background:#fff5f5;
  border-left:4px solid red;
  padding:8px;
  margin:5px 0;
}

#logoutBtn{
  position:fixed;
  bottom:20px;
  right:20px;
}
</style>
</head>

<body>

<header>SUNGSIM</header>
<button id="logoutBtn" onclick="logout()">로그아웃</button>

<div class="container">

<!-- LEFT -->
<div class="left">

<div class="box">
  <h3>🏥 병원 필터</h3>
  <select id="viewHospital" onchange="render()">
    <option value="all">전체</option>
  </select>
</div>

<div class="box">
  <h3>📦 재고 등록</h3>
  <select id="hospital"></select>
  <input id="name" placeholder="시약명">
  <input id="qty" placeholder="수량">
  <input id="exp" type="date">
  <input id="lot" placeholder="LOT">
  <button onclick="addItem()">등록</button>
</div>

<div class="box">
  <h3>📥 대량등록</h3>
  <textarea id="bulkInput" rows="6" style="width:100%"></textarea>
  <button onclick="bulkAdd()">일괄등록</button>
</div>

<div class="box">
  <h3>📋 재고 목록</h3>
  <table>
    <thead>
      <tr>
        <th>병원</th>
        <th>시약</th>
        <th>수량</th>
        <th>유효기간</th>
        <th>LOT</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>
</div>

</div>

<!-- RIGHT -->
<div class="right">

<div class="box">
  <h3>🏢 거래처 필터</h3>
  <div id="clientButtons"></div>
</div>

<div class="box">
  <h3>📌 미납</h3>

  <select id="b_hospital"></select>
  <input id="b_name" placeholder="시약명">
  <input id="b_qty" placeholder="수량">
  <input id="b_reason" placeholder="사유">
  <button onclick="addBacklog()">등록</button>

  <select id="filterHospital" onchange="renderBacklog()"></select>

  <select id="filterMonth" onchange="renderBacklog()">
    <option value="all">전체월</option>
    <option>1</option><option>2</option><option>3</option>
    <option>4</option><option>5</option><option>6</option>
    <option>7</option><option>8</option><option>9</option>
    <option>10</option><option>11</option><option>12</option>
  </select>

  <div id="backlogList"></div>
</div>

</div>
</div>

<script>

/* ===== DATA ===== */
let items=[];
let backlog=[];
let selectedClient=null;

/* ===== INIT ===== */
window.onload=()=>{

  loadData();

  const h=["경주동국대병원","구미차병원"];

  h.forEach(v=>{
    hospital.innerHTML+=`<option>${v}</option>`;
    b_hospital.innerHTML+=`<option>${v}</option>`;
    filterHospital.innerHTML+=`<option>${v}</option>`;
    viewHospital.innerHTML+=`<option value="${v}">${v}</option>`;
  });

  render();
};

/* ===== SAVE ===== */
function saveData(){
  localStorage.setItem("sungsim_items",JSON.stringify(items));
  localStorage.setItem("sungsim_backlog",JSON.stringify(backlog));
}

function loadData(){
  items = JSON.parse(localStorage.getItem("sungsim_items")||"[]");
  backlog = JSON.parse(localStorage.getItem("sungsim_backlog")||"[]");
}

/* ===== ADD ===== */
function addItem(){

  if(!hospital.value || !name.value || !qty.value){
    alert("필수 입력");
    return;
  }

  items.push({
    hospital:hospital.value,
    name:name.value,
    qty:Number(qty.value),
    exp:exp.value || "",
    lot:lot.value || ""
  });

  saveData();
  clearInputs();
  render();
}

function clearInputs(){
  name.value="";
  qty.value="";
  exp.value="";
  lot.value="";
}

/* ===== BULK ===== */
function bulkAdd(){

  bulkInput.value.split("\n").forEach(line=>{

    let p=line.split("|");
    if(!p[0]) return;

    items.push({
      hospital:hospital.value,
      name:(p[0]||"").trim(),
      qty:Number(p[1]||0),
      exp:(p[2]||""),
      lot:(p[3]||"")
    });

  });

  saveData();
  render();
}

/* ===== RENDER ===== */
function render(){

  list.innerHTML="";
  clientButtons.innerHTML="";

  let vh=viewHospital.value;

  let filtered=items.filter(i=>{
    return (vh==="all" || i.hospital===vh)
      && (!selectedClient || i.hospital===selectedClient);
  });

  if(filtered.length===0){
    list.innerHTML=`<tr><td colspan="5">데이터 없음</td></tr>`;
  }

  filtered.forEach(i=>{

    let diff=(new Date(i.exp)-new Date())/86400000;
    let color=diff<0?"red":diff<7?"orange":"black";

    list.innerHTML+=`
      <tr>
        <td>${i.hospital}</td>
        <td>${i.name}</td>
        <td>${i.qty}</td>
        <td style="color:${color}">${i.exp}</td>
        <td>${i.lot}</td>
      </tr>
    `;
  });

  [...new Set(items.map(i=>i.hospital))].forEach(c=>{
    clientButtons.innerHTML+=
      `<button onclick="toggleClient('${c}')">${c}</button>`;
  });

  renderBacklog();
}

/* ===== CLIENT FILTER ===== */
function toggleClient(c){
  selectedClient = (selectedClient===c)?null:c;
  render();
}

/* ===== BACKLOG ===== */
function addBacklog(){

  backlog.push({
    hospital:b_hospital.value,
    name:b_name.value,
    qty:Number(b_qty.value),
    reason:b_reason.value,
    date:new Date()
  });

  saveData();
  renderBacklog();
}

function renderBacklog(){

  backlogList.innerHTML="";

  let fh=filterHospital.value;
  let fm=filterMonth.value;

  let group={};

  backlog.forEach(i=>{

    if(fh!="all" && i.hospital!=fh) return;

    let m=new Date(i.date).getMonth()+1;
    if(fm!="all" && fm!=m) return;

    let key=i.hospital+"_"+m;

    if(!group[key]) group[key]=[];
    group[key].push(i);
  });

  for(let k in group){

    backlogList.innerHTML+=`<h4>${k}</h4>`;

    group[k].forEach(i=>{
      backlogList.innerHTML+=`
        <div class="alert">${i.name} | ${i.qty} | ${i.reason}</div>
      `;
    });
  }
}

/* ===== LOGOUT ===== */
function logout(){
  location.reload();
}

</script>

</body>
</html>
