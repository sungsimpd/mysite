<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>병원 시약 재고 ERP</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #eef2f7;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 20px;
    }

    .box {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    input, select {
      padding: 10px;
      margin: 5px;
      font-size: 14px;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #3498db;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      padding: 5px;
      border-bottom: 1px solid #eee;
    }
  </style>
</head>

<body>

<header>
  🧪 병원 시약 재고 관리 ERP
</header>

<!-- 🔐 로그인 -->
<div class="box" id="loginBox">
  <h3>로그인</h3>
  <input id="id" placeholder="아이디">
  <input id="pw" type="password" placeholder="비밀번호">
  <button onclick="login()">로그인</button>
</div>

<!-- 앱 -->
<div id="app" style="display:none;">

  <button onclick="logout()">로그아웃</button>

  <!-- 📦 재고 -->
  <div class="box">
    <h3>📦 재고 등록</h3>

    <select id="hospital">
      <option value="경주동국대병원">경주동국대병원</option>
      <option value="구미차병원">구미차병원</option>
    </select>

    <input id="name" placeholder="시약명">
    <input id="qty" placeholder="수량">
    <input id="exp" placeholder="유효기간 YYYY-MM-DD">
    <button onclick="addItem()">등록</button>
  </div>

  <!-- 재고 리스트 -->
  <div class="box">
    <h3>📋 재고 목록</h3>
    <ul id="list"></ul>
  </div>

  <!-- 🚚 출고 -->
  <div class="box">
    <h3>🚚 출고 등록</h3>

    <select id="outHospital">
      <option value="경주동국대병원">경주동국대병원</option>
      <option value="구미차병원">구미차병원</option>
    </select>

    <input id="client" placeholder="거래처">
    <input id="item" placeholder="시약명">
    <input id="outQty" placeholder="수량">
    <button onclick="addOut()">출고</button>
  </div>

  <!-- 출고 리스트 -->
  <div class="box">
    <h3>📦 출고 내역</h3>
    <ul id="outList"></ul>
  </div>

  <!-- 🚨 발주 리스트 -->
  <div class="box">
    <h3>📦 발주 필요 목록</h3>
    <ul id="lowStock"></ul>
  </div>

</div>

<script>

  // 🔐 로그인
  function login() {
    const id = document.getElementById('id').value;
    const pw = document.getElementById('pw').value;

    if (id === "admin" && pw === "1234") {
      localStorage.setItem("login", "true");
      showApp();
    } else {
      alert("로그인 실패");
    }
  }

  function logout() {
    localStorage.removeItem("login");
    location.reload();
  }

  function showApp() {
    document.getElementById('loginBox').style.display = "none";
    document.getElementById('app').style.display = "block";
  }

  window.onload = function() {
    if (localStorage.getItem("login") === "true") {
      showApp();
    }
  };

  // 📦 재고
  let items = [];
  let lowStockList = [];

  function addItem() {
    const hospital = document.getElementById('hospital').value;
    const name = document.getElementById('name').value;
    const qty = Number(document.getElementById('qty').value);
    const exp = document.getElementById('exp').value;

    items.push({ hospital, name, qty, exp });
    render();
  }

  function render() {
    const list = document.getElementById('list');
    list.innerHTML = '';

    const today = new Date();
    lowStockList = [];

    items.forEach(i => {
      const expDate = new Date(i.exp);
      const diff = (expDate - today) / (1000*60*60*24);

      let expStatus = "";
      if (diff < 0) expStatus = "❌ 만료";
      else if (diff < 7) expStatus = "🔥 긴급";
      else if (diff < 30) expStatus = "⚠️ 임박";
      else expStatus = "✅ 정상";

      let stockStatus = "";

      if (i.qty <= 5) {
        stockStatus = "🔥 재고위험";
        lowStockList.push(i);
        alert(`🚨 [${i.hospital}] ${i.name} 재고 부족 (${i.qty})`);
      }
      else if (i.qty <= 10) {
        stockStatus = "🚨 부족";
        lowStockList.push(i);
      }
      else {
        stockStatus = "✅ 정상";
      }

      list.innerHTML += `
        <li>[${i.hospital}] ${i.name} | ${i.qty} | ${i.exp} | ${expStatus} | ${stockStatus}</li>
      `;
    });

    renderLowStock();
  }

  function renderLowStock() {
    const el = document.getElementById('lowStock');
    el.innerHTML = '';

    const grouped = {
      "경주동국대병원": [],
      "구미차병원": []
    };

    lowStockList.forEach(i => {
      grouped[i.hospital].push(i);
    });

    for (let h in grouped) {
      el.innerHTML += `<h4>🏥 ${h}</h4>`;

      grouped[h].forEach(i => {
        el.innerHTML += `<li>📦 ${i.name} | ${i.qty}개 (발주 필요)</li>`;
      });
    }
  }

  // 🚚 출고
  let outList = [];

  function addOut() {
    const hospital = document.getElementById('outHospital').value;
    const client = document.getElementById('client').value;
    const item = document.getElementById('item').value;
    const qty = document.getElementById('outQty').value;

    outList.push({ hospital, client, item, qty });
    renderOut();
  }

  function renderOut() {
    const list = document.getElementById('outList');
    list.innerHTML = '';

    outList.forEach(o => {
      list.innerHTML += `
        <li>[${o.hospital}] ${o.client} | ${o.item} | ${o.qty}</li>
      `;
    });
  }

</script>

</body>
</html>
